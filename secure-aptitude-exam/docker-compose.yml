version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aptitude_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-aptitude_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aptitude_pass}
      POSTGRES_DB: ${DB_NAME:-aptitude_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aptitude_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aptitude_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aptitude.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
